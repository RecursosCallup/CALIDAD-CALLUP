<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Calidad · Retención</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --navy:#3B1142;
  --navy-2:#4A1652;
  --blue:#2E6DA4;
  --blue-soft:#E9F1FA;
  --green:#1E8E5A;
  --green-soft:#E5F5ED;
  --red:#C0392B;
  --red-soft:#FBEAE9;
  --amber:#C8862A;
  --amber-soft:#FBF1E1;
  --brand:#E5147C;
  --brand-2:#C4106A;
  --brand-soft:#FCE4F1;
  --bg:#F3F5F8;
  --card:#FFFFFF;
  --border:#E1E5EB;
  --text:#1B232E;
  --text-soft:#646E7C;
  --text-faint:#9BA4B0;
  --radius:12px;
  --radius-sm:8px;
  --font-display:'Sora',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --shadow:0 1px 2px rgba(59,17,66,.08), 0 4px 16px rgba(59,17,66,.06);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:14px;}
::selection{background:#F6C9E3;}

/* ===== LAYOUT ===== */
.app{display:flex;min-height:100vh;}
.sidebar{
  width:240px;flex-shrink:0;background:linear-gradient(180deg,var(--navy),#2A0C30);
  display:flex;flex-direction:column;padding:22px 14px;
  position:fixed;top:0;left:0;height:100vh;z-index:50;
}
.brand{display:flex;align-items:center;gap:10px;padding:6px 10px 26px;}
.brand-mark{
  width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--brand),#8E1F7A);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:var(--font-display);font-weight:800;color:#fff;font-size:15px;
}
.brand-text{line-height:1.15;}
.brand-text strong{display:block;font-family:var(--font-display);color:#fff;font-size:14.5px;font-weight:700;letter-spacing:.2px;}
.brand-text span{display:block;color:#C99AC4;font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;margin-top:2px;}

.nav{display:flex;flex-direction:column;gap:4px;margin-top:6px;}
.nav-btn{
  display:flex;align-items:center;gap:11px;padding:10px 12px;border:none;background:transparent;
  color:#C9AFCB;border-radius:var(--radius-sm);font-size:13.5px;font-weight:500;text-align:left;
  transition:background .15s,color .15s;
}
.nav-btn svg{width:18px;height:18px;flex-shrink:0;opacity:.85;}
.nav-btn:hover{background:rgba(255,255,255,.08);color:#fff;}
.nav-btn.active{background:var(--brand);color:#fff;}
.nav-btn.active svg{opacity:1;}
.nav-num{font-family:var(--font-mono);font-size:10.5px;color:#9A6E98;width:16px;flex-shrink:0;}
.sidebar-mascot{margin-top:auto;display:flex;justify-content:center;padding:6px 0 4px;}
.sidebar-mascot img{width:100%;max-width:150px;height:auto;filter:drop-shadow(0 6px 14px rgba(0,0,0,.35));}
.nav-btn.active .nav-num{color:rgba(255,255,255,.65);}

.sidebar-foot{margin-top:auto;padding:12px 10px 2px;border-top:1px solid rgba(255,255,255,.08);}
.storage-pill{display:flex;align-items:center;gap:7px;font-size:11px;color:#B98FB8;padding:8px 2px 0;}
.storage-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
.storage-dot.off{background:var(--amber);}

.main{flex:1;margin-left:240px;min-height:100vh;display:flex;flex-direction:column;}
.topbar{
  height:64px;flex-shrink:0;background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:30;
}
.topbar h1{font-family:var(--font-display);font-size:18px;font-weight:700;margin:0;}
.topbar .sub{color:var(--text-soft);font-size:12.5px;margin-top:1px;}
.content{padding:26px 28px 60px;flex:1;}
.view{display:none;}
.view.active{display:block;animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* ===== GENERIC ===== */
.grid{display:grid;gap:18px;}
.cards-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
.kpi{padding:18px 20px;}
.kpi-label{font-size:12px;color:var(--text-soft);font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.kpi-value{font-family:var(--font-display);font-size:28px;font-weight:800;margin-top:6px;}
.kpi-foot{font-size:12px;color:var(--text-faint);margin-top:4px;}
.kpi.green .kpi-value{color:var(--green);}
.kpi.red .kpi-value{color:var(--red);}
.kpi.blue .kpi-value{color:var(--brand);}

.panel{padding:20px 22px;margin-bottom:20px;}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.panel-head h3{font-family:var(--font-display);font-size:15px;font-weight:700;margin:0;}
.panel-head .hint{font-size:12px;color:var(--text-faint);}
.two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--text-soft);font-weight:700;padding:9px 10px;border-bottom:1px solid var(--border);}
td{padding:10px;border-bottom:1px solid #EEF1F4;}
tr:last-child td{border-bottom:none;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11.5px;font-weight:600;}
.badge.green{background:var(--green-soft);color:var(--green);}
.badge.red{background:var(--red-soft);color:var(--red);}
.badge.amber{background:var(--amber-soft);color:var(--amber);}
.badge.gray{background:#EEF1F4;color:var(--text-soft);}

.stat-row{display:flex;align-items:center;gap:12px;padding:8px 4px;border-bottom:1px solid #EEF1F4;}
.stat-row:last-child{border-bottom:none;}
.stat-label{flex:0 0 230px;font-size:12.5px;font-weight:600;color:var(--text);line-height:1.3;}
.stat-label .stat-sub{display:block;font-size:10.5px;font-weight:500;color:var(--text-faint);margin-top:1px;}
.stat-bar-track{flex:1;height:8px;background:#EEF1F4;border-radius:99px;overflow:hidden;min-width:60px;}
.stat-bar-fill{height:100%;border-radius:99px;transition:width .3s;}
.stat-pct{flex:0 0 50px;text-align:right;font-family:var(--font-mono);font-weight:700;font-size:12.5px;}
.stat-n{flex:0 0 64px;text-align:right;font-size:10.5px;color:var(--text-faint);}
.stat-scroll{max-height:380px;overflow-y:auto;}
.stat-compact .stat-label{flex-basis:150px;}
.stat-compact .stat-n{flex-basis:50px;}

.gauge-row{display:flex;justify-content:space-around;align-items:flex-start;flex-wrap:wrap;gap:10px;padding-top:4px;}
.gauge-card{text-align:center;width:110px;}
.gauge-wrap{position:relative;height:68px;}
.gauge-pct{position:absolute;top:30px;left:0;right:0;text-align:center;font-family:var(--font-display);font-weight:800;font-size:19px;}
.gauge-code{font-family:var(--font-display);font-weight:700;font-size:12.5px;color:var(--navy-2);margin-top:4px;}
.gauge-sub{font-size:10px;color:var(--text-faint);margin-top:1px;line-height:1.25;}
.gauge-n{font-size:9.5px;color:var(--text-faint);margin-top:3px;}

.dash-tipo-toggle{display:inline-flex;gap:3px;background:#EEF0F4;border-radius:9px;padding:3px;}
.dash-tipo-btn{padding:6px 14px;border-radius:7px;border:none;background:transparent;font-family:var(--font-body);font-size:11.5px;font-weight:600;color:var(--text-soft);cursor:pointer;}
.dash-tipo-btn.active{background:#fff;color:var(--brand-2);box-shadow:0 1px 4px rgba(0,0,0,.08);}

/* ===== MÓDULO RETENCIONES (CALENDARIO) ===== */
.ret-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:8px;text-align:center;font-size:11px;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:.4px;}
.ret-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.ret-day{position:relative;aspect-ratio:1/1;border-radius:var(--radius-sm);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:13px;font-weight:700;transition:filter .12s,transform .12s;border:1px solid transparent;}
.ret-day:hover{transform:translateY(-2px);filter:brightness(.97);}
.ret-day.empty-cell{visibility:hidden;cursor:default;}
.ret-day.ret-green{background:var(--green-soft);color:var(--green);border-color:#BFE6D2;}
.ret-day.ret-red{background:var(--red-soft);color:var(--red);border-color:#F1C9C4;}
.ret-day.ret-future{background:#F3F5F8;color:var(--text-faint);border-color:var(--border);}
.ret-day.ret-today{box-shadow:0 0 0 2px var(--brand);}
.ret-day-count{font-size:9.5px;font-weight:600;margin-top:2px;opacity:.8;}
.ret-legend-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle;}
.motivo-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #EEF1F4;}
.motivo-row:last-child{border-bottom:none;}
.motivo-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
@media (max-width:700px){ .stat-label{flex-basis:140px;font-size:11.5px;} }

.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;border:1px solid transparent;transition:filter .12s,background .12s;}
.btn:hover{filter:brightness(.96);}
.btn-primary{background:var(--brand);color:#fff;}
.btn-dark{background:var(--navy);color:#fff;}
.btn-outline{background:#fff;color:var(--text);border-color:var(--border);}
.btn-outline:hover{background:#F7F9FB;}
.btn-danger-outline{background:#fff;color:var(--red);border-color:#F1C9C4;}
.btn-success{background:var(--green);color:#fff;}
.btn-sm{padding:6px 11px;font-size:12px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-soft);margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;color:var(--text);
}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--brand-soft);border-color:var(--brand);}
.field textarea{resize:vertical;min-height:64px;}
.field-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}

.empty{padding:32px 20px;text-align:center;color:var(--text-faint);font-size:13px;}
.empty svg{width:36px;height:36px;opacity:.4;margin-bottom:10px;}

::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:#D6DCE3;border-radius:6px;}

@media (max-width:980px){
  .sidebar{display:none;}
  .main{margin-left:0;}
  .cards-row{grid-template-columns:repeat(2,1fr);}
  .two-col{grid-template-columns:1fr;}
  .field-row{grid-template-columns:1fr;}
}
</style>
</head>

const Storage = {
  mode: (typeof window.storage !== 'undefined') ? 'claude' : (db ? 'firebase' : 'none'),
  get available(){ return this.mode !== 'none'; },

  async get(key, fallback, shared){
    if(this.mode === 'claude'){
      try{
        const r = await window.storage.get(key, shared);
        return r && r.value ? JSON.parse(r.value) : fallback;
      }catch(e){ return fallback; }
    }
    if(this.mode === 'firebase'){
      try{
        const doc = await db.collection('calidad_data').doc(key).get();
        return doc.exists ? JSON.parse(doc.data().value) : fallback;
      }catch(e){ console.error('Firestore get error', e); return fallback; }
    }
    return fallback;
  },

  async set(key, value, shared){
    if(this.mode === 'claude'){
      try{ await window.storage.set(key, JSON.stringify(value), shared); return true; }
      catch(e){ console.error('storage.set error', e); return false; }
    }
    if(this.mode === 'firebase'){
      try{ await db.collection('calidad_data').doc(key).set({ value: JSON.stringify(value), updatedAt: new Date().toISOString() }); return true; }
      catch(e){ console.error('Firestore set error', e); return false; }
    }
    return false;
  }
};

  if(score>=90) return 'green';
  if(score>=70) return 'amber';
  return 'red';
}
function getGroups(){
  return [...new Set(asesores.map(a=>a.grupo).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
}
function findAsesorByName(name){
  if(!name) return null;
  const n = name.trim().toLowerCase();
  return asesores.find(a=>a.nombre.trim().toLowerCase()===n) || null;
}

}

/* ============================== SCORING ============================== */
function evaluarItem(item, answers){
  const allAnswered = item.sub.every(s => answers[s.id]===true || answers[s.id]===false);
  if(!allAnswered) return {complete:false, cumple:null, score:0};
  const cumple = item.sub.every(s => answers[s.id]===true);
  return {complete:true, cumple, score: cumple ? item.peso : 0};
}
function computeResultado(answers, faltasChecked){
  if(faltasChecked && faltasChecked.length>0){
    return {anulado:true, finalScore:0, items:{}, allComplete:true};
  }
  let total=0, allComplete=true;
  const items={};
  PAUTA.forEach(cat=>cat.items.forEach(item=>{
    const r = evaluarItem(item, answers);
    items[item.id]=r;
    if(!r.complete) allComplete=false;
    total += r.score;
  }));
  return {anulado:false, finalScore: Math.round(total*100)/100, items, allComplete};
}

function isInCurrentWeek(dateStr){
  const d = new Date(dateStr); if(isNaN(d)) return false;
  const now = new Date();
  const start = new Date(now); start.setDate(now.getDate()-now.getDay()); start.setHours(0,0,0,0);
  const end = new Date(start); end.setDate(start.getDate()+7);
  return d>=start && d<end;
}
function isInCurrentMonth(dateStr){
  const d = new Date(dateStr); if(isNaN(d)) return false;
  const now = new Date();
  return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
}

function colorForPct(pct){
  if(pct===null || pct===undefined) return '#D6DCE3';
  if(pct>=90) return 'var(--green)';
  if(pct>=70) return 'var(--amber)';
  return 'var(--red)';
}
function statBarRowHTML(label, tag, pct, n){
  const color = colorForPct(pct);
  const pctText = (pct===null||pct===undefined) ? '—' : pct.toFixed(0)+'%';
  return `<div class="stat-row">
    <div class="stat-label">${escapeHtml(label)}${tag?`<span class="stat-sub">${escapeHtml(tag)}</span>`:''}</div>
    <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct?Math.min(pct,100):0}%;background:${color};"></div></div>
    <div class="stat-pct" style="color:${color};">${pctText}</div>
    <div class="stat-n">${n} eval.</div>
  </div>`;
}

function computeCategoriaStats(list){
  list = list || evaluaciones;
  return PAUTA.map(cat=>{
    let sum=0, n=0;
    list.forEach(e=>{
      if(e.anulado || !e.itemResults) return;
      let catScore=0, complete=true;
      cat.items.forEach(item=>{
        const res = e.itemResults[item.id];
        if(res && res.complete) catScore += res.score; else complete=false;
      });
      if(complete){ sum += (catScore/cat.catPeso*100); n++; }
    });
    return { label: cat.catLabel, tag: cat.cat+' · peso '+cat.catPeso+'%', pct: n? sum/n : null, n };
  });
}
function computeItemStats(list){
  list = list || evaluaciones;
  const rows=[];
  PAUTA.forEach(cat=>cat.items.forEach(item=>{
    let cumple=0, total=0;
    list.forEach(e=>{
      if(e.anulado || !e.itemResults) return;
      const res = e.itemResults[item.id];
      if(res && res.complete){ total++; if(res.cumple) cumple++; }
    });
    rows.push({ label:item.nombre, tag:cat.cat+' · peso '+item.peso+'%', pct: total? (cumple/total*100) : null, n:total });
  }));
  return rows;
}
function computeSubitemStats(list){
  list = list || evaluaciones;
  const rows=[];
  PAUTA.forEach(cat=>cat.items.forEach(item=>item.sub.forEach(s=>{
    let cumple=0, total=0;
    list.forEach(e=>{
      if(e.anulado || !e.answers) return;
      const val = e.answers[s.id];
      if(val===true || val===false){ total++; if(val===true) cumple++; }
    });
    rows.push({ label:s.t, tag:item.nombre, pct: total? (cumple/total*100) : null, n:total });
  })));
  return rows.sort((a,b)=>{
    if(a.pct===null) return 1;
    if(b.pct===null) return -1;
    return a.pct-b.pct;
  });
}
function computeMotivoStats(list){
  list = list || evaluaciones;
  const noRet = list.filter(e=>e.retenida===false);
  const counts = {Agente:0, Cliente:0, Proceso:0};
  let sinEspecificar = 0;
  noRet.forEach(e=>{
    if(e.aQuien && counts.hasOwnProperty(e.aQuien)) counts[e.aQuien]++; else sinEspecificar++;
  });
  return { counts, sinEspecificar, total: noRet.length };
}

function weekKey(dateStr){
  const d = new Date(dateStr); if(isNaN(d)) return null;
  const start = new Date(d); start.setDate(d.getDate()-d.getDay()); start.setHours(0,0,0,0);
  return start.toISOString().slice(0,10);
}
function monthKey(dateStr){
  const d = new Date(dateStr); if(isNaN(d)) return null;
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function weekLabel(k){ return new Date(k).toLocaleDateString('es-PE',{day:'2-digit',month:'short'}); }
function monthLabel(k){ const [y,m]=k.split('-'); return new Date(parseInt(y),parseInt(m)-1,1).toLocaleDateString('es-PE',{month:'short',year:'2-digit'}); }
function computeBucketedAvg(keyFn, limit, list){
  list = list || evaluaciones;
  const map = {};
  list.forEach(e=>{
    const k = keyFn(e.fecha);
    if(!k) return;
    if(!map[k]) map[k]={sum:0,n:0};
    map[k].sum += (e.anulado?0:e.finalScore); map[k].n++;
  });
  const keys = Object.keys(map).sort();
  return keys.slice(-limit).map(k=>({ key:k, avg: map[k].n? map[k].sum/map[k].n : null, n: map[k].n }));
}

        </td>
      </tr>`).join('')}
    </table>`;
    document.querySelectorAll('.dash-del-btn').forEach(btn=>{
      btn.onclick = async ()=>{
        const ev = evaluaciones.find(e=>e.id===btn.dataset.id);
        if(!ev) return;
        if(!confirm(`¿Eliminar la evaluación de ${ev.nombre} del ${fmtDate(ev.fecha)}?\nEsta acción no se puede deshacer.`)) return;
        evaluaciones = evaluaciones.filter(e=>e.id!==btn.dataset.id);
        await persistEvaluaciones();
        renderDashboard();
      };
    });
    document.querySelectorAll('.dash-pdf-btn').forEach(btn=>{
      btn.onclick = ()=>{
        const ev = evaluaciones.find(e=>e.id===btn.dataset.id);
        if(!ev) return;
        const root = document.getElementById('pdf-root');
        const content = document.getElementById('pdf-content');
        const overlay = document.getElementById('pdf-loading-overlay');
        content.innerHTML = buildPdfHTML(ev);
        root.style.display = 'block';
        overlay.style.display = 'flex';
        const opt = {
          margin:0, filename:`evaluacion_${(ev.nombre||'asesor').replace(/\s+/g,'_')}_${ev.fecha}.pdf`,
          image:{type:'jpeg', quality:0.98},
          html2canvas:{scale:2, backgroundColor:'#ffffff', useCORS:true, windowWidth:content.scrollWidth},
          jsPDF:{unit:'pt', format:'a4', orientation:'portrait'}
        };
        const fontsReady = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
        fontsReady
          .then(()=>new Promise(res=>setTimeout(res,150)))
          .then(()=>html2pdf().from(content).set(opt).save())
          .finally(()=>{ root.style.display='none'; overlay.style.display='none'; content.innerHTML=''; });
      };
    });
  }

  document.querySelectorAll('#dash-tipo-toggle .dash-tipo-btn').forEach(btn=>{
    btn.onclick = ()=>{
      dashboardTipoFilter = btn.dataset.tipo;
      renderDashboard();
    };
  });

function ringSVG(score, size){
  size = size||86;
  const r = (size/2)-7, c = 2*Math.PI*r, color = score>=90?'var(--green)':score>=70?'var(--amber)':'var(--red)';
  const off = c - (Math.min(Math.max(score,0),100)/100)*c;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#EAEDF1" stroke-width="7"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="7" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})"/>
    <text x="50%" y="53%" text-anchor="middle" font-family="Sora,sans-serif" font-weight="800" font-size="${size*0.24}" fill="var(--text)">${Math.round(score)}%</text>
  </svg>`;
}

function gaugeSVG(pct, color){
  const r=48, cx=60, cy=58, sw=13;
  const path = `M ${cx-r} ${cy} A ${r} ${r} 0 1 1 ${cx+r} ${cy}`;
  const circumference = Math.PI*r;
  const val = (pct===null||pct===undefined) ? 0 : Math.max(0,Math.min(100,pct));
  const filled = circumference*(val/100);
  return `<svg viewBox="0 0 120 68" width="120" height="68">
    <path d="${path}" fill="none" stroke="#E9E7F2" stroke-width="${sw}" stroke-linecap="round"/>
    <path d="${path}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round"
      stroke-dasharray="${filled} ${circumference-filled}"/>
  </svg>`;
}
function gaugeCardHTML(code, sublabel, pct, color, n){
  const pctText = (pct===null||pct===undefined) ? '—' : Math.round(pct)+'%';
  return `<div class="gauge-card">
    <div class="gauge-wrap">
      ${gaugeSVG(pct,color)}
      <div class="gauge-pct" style="color:${color};">${pctText}</div>
    </div>
    <div class="gauge-code">${escapeHtml(code)}</div>
    <div class="gauge-sub">${escapeHtml(sublabel)}</div>
    <div class="gauge-n">${n} evaluación(es)</div>
  </div>`;
}

function bindNombreAutocomplete(){
  const input = document.getElementById('f-nombre');
  const box = document.getElementById('nombre-suggestions');
  if(!input || !box) return;
  function selectAsesor(a){
    input.value = a.nombre;
    evalState.nombre = a.nombre;
    evalState.asesorId = a.id;
    document.getElementById('f-grupo').value = a.grupo||'';
    evalState.grupo = a.grupo||'';
    box.classList.remove('show'); box.innerHTML='';
  }
  function showMatches(){
    const q = input.value.trim().toLowerCase();
    let list = q ? asesores.filter(a=>a.nombre.toLowerCase().includes(q)) : asesores;
    list = list.slice(0,8);
    if(!list.length){ box.classList.remove('show'); box.innerHTML=''; return; }
    box.innerHTML = list.map(a=>`<div class="suggest-item" data-id="${a.id}"><span class="s-name">${escapeHtml(a.nombre)}</span><span class="s-grupo">${escapeHtml(a.grupo||'Sin grupo')}</span></div>`).join('');
    box.classList.add('show');
    box.querySelectorAll('.suggest-item').forEach(item=>{
      item.addEventListener('mousedown', e=>{
        e.preventDefault();
        const a = asesores.find(x=>x.id===item.dataset.id);
        if(a) selectAsesor(a);
      });
    });
  }
  input.addEventListener('focus', showMatches);
  input.addEventListener('input', showMatches);
  input.addEventListener('blur', ()=>{ setTimeout(()=>box.classList.remove('show'), 120); });
}

function bindEvaluacionEvents(){
  const view = document.getElementById('view-evaluacion');
  view.querySelectorAll('input,textarea,select').forEach(el=>{
    const evt = el.tagName==='SELECT' ? 'change' : 'input';
    el.addEventListener(evt, ()=>{
      evalState.nombre = document.getElementById('f-nombre').value;
      evalState.celular = document.getElementById('f-celular').value;
      evalState.fecha = document.getElementById('f-fecha').value;
      evalState.grupo = document.getElementById('f-grupo').value;
      evalState.evaluador = document.getElementById('f-evaluador').value;
      const motivoEl = document.getElementById('f-motivo');
      if(motivoEl){
        evalState.motivo = motivoEl.value;
        const detalleField = document.getElementById('motivo-detalle-field');
        if(detalleField) detalleField.style.display = /OTROS/i.test(evalState.motivo) ? 'block' : 'none';
      }
      const detalleEl = document.getElementById('f-motivo-detalle');
      if(detalleEl) evalState.motivoDetalle = detalleEl.value;
      evalState.feedback = document.getElementById('f-feedback').value;
    });
  });
  document.getElementById('f-nombre').addEventListener('change', ()=>{
    const a = findAsesorByName(document.getElementById('f-nombre').value);
    if(a){
      evalState.asesorId = a.id;
      if(!evalState.grupo) document.getElementById('f-grupo').value = a.grupo||'';
      evalState.grupo = document.getElementById('f-grupo').value;
    } else { evalState.asesorId = null; }
  });

  document.getElementById('btn-ret-si').onclick = ()=>{ evalState.retenida = true; renderEvaluacionView(); };
  document.getElementById('btn-ret-no').onclick = ()=>{ evalState.retenida = false; renderEvaluacionView(); };

  document.getElementById('btn-tipo-muestral').onclick = ()=>{ evalState.tipoEval = 'Muestral'; renderEvaluacionView(); };
  document.getElementById('btn-tipo-seguimiento').onclick = ()=>{ evalState.tipoEval = 'Seguimiento'; renderEvaluacionView(); };

  view.querySelectorAll('.aquien-opt button').forEach(b=>{
    b.onclick = ()=>{
      if(evalState.aQuien !== b.dataset.aq){ evalState.motivo=''; evalState.motivoDetalle=''; }
      evalState.aQuien = b.dataset.aq;
      renderEvaluacionView();
    };
  });

  view.querySelectorAll('.toggle-btn').forEach(b=>{
    b.addEventListener('click', ()=>{
      const sub = b.dataset.sub, val = b.dataset.val==='true';
      evalState.answers[sub] = val;
      const row = b.closest('.sub-row');
      row.querySelectorAll('.toggle-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      recalcEvaluacion();
    });
  });

  view.querySelectorAll('.falta-check').forEach(cb=>{
    cb.addEventListener('change', ()=>{
      const fid = cb.dataset.fid;
      evalState.faltasChecked = evalState.faltasChecked.filter(x=>x!==fid);
      if(cb.checked) evalState.faltasChecked.push(fid);
      recalcEvaluacion();
    });
  });

  document.getElementById('btn-guardar').onclick = guardarEvaluacion;
  document.getElementById('btn-pdf').onclick = ()=>generarPDFEvaluacion();
  document.getElementById('btn-nueva-eval-2').onclick = ()=>{
    if(confirm('¿Borrar todo y comenzar una nueva evaluación?')){ evalState = newEvalState(); renderEvaluacionView(); }
  };
  bindNombreAutocomplete();
}

function recalcEvaluacion(){
  const r = computeResultado(evalState.answers, evalState.faltasChecked);
  let itemsDone = 0;
  PAUTA.forEach(cat=>cat.items.forEach(item=>{
    const res = r.items[item.id];
    const el = document.getElementById('score-'+item.id);
    if(!el) return;
    if(!res || !res.complete){ el.textContent='—'; el.className='item-score'; }
    else{
      itemsDone++;
      el.textContent = res.cumple ? item.peso+'%' : '0%';
      el.className = 'item-score ' + (res.cumple?'ok':'bad');
    }
  }));
  document.getElementById('sum-items').textContent = itemsDone+'/'+PAUTA.reduce((s,c)=>s+c.items.length,0);
  document.getElementById('sum-faltas').textContent = evalState.faltasChecked.length;
  document.getElementById('ring-holder').innerHTML = ringSVG(r.anulado?0:r.finalScore);
  const banner = document.getElementById('anulado-banner-holder');
  const estado = document.getElementById('estado-texto');
  if(r.anulado){
    banner.innerHTML = '<div class="anulado-banner">⚠ EXAMEN ANULADO — Falta grave detectada</div>';
    estado.textContent = 'La nota se fija en 0% por falta grave.';
  } else {
    banner.innerHTML = '';
    estado.textContent = r.allComplete ? 'Evaluación completa.' : 'Faltan sub-ítems por calificar.';
  }
  evalState._result = r;
}

async function guardarEvaluacion(){
  if(!evalState.nombre){ alert('Ingresa el nombre del asesor.'); return; }
  if(!evalState.evaluador){ alert('Ingresa quién realiza la evaluación.'); return; }
  if(evalState.retenida===null){ alert('Indica si la llamada fue retenida o no.'); return; }
  if(evalState.retenida===false){
    if(!evalState.aQuien){ alert('Indica a qué se debe la no retención (Agente / Cliente / Proceso).'); return; }
    if(!evalState.motivo){ alert('Selecciona el motivo de no retención.'); return; }
  }
  if(!evalState.tipoEval){ alert('Selecciona el tipo de evaluación: Muestral o Seguimiento.'); return; }
  const r = evalState._result || computeResultado(evalState.answers, evalState.faltasChecked);
  if(!r.anulado && !r.allComplete){
    if(!confirm('Hay sub-ítems sin calificar (se contarán como 0%). ¿Guardar de todas formas?')) return;
  }
  const id = evalState.savedId || uid('ev');
  const record = {
    id, nombre: evalState.nombre, asesorId: evalState.asesorId, celular: evalState.celular,
    grupo: evalState.grupo, evaluador: evalState.evaluador, fecha: evalState.fecha,
    retenida: evalState.retenida, aQuien: evalState.aQuien, motivo: evalState.motivo, motivoDetalle: evalState.motivoDetalle,
    tipoEval: evalState.tipoEval,
    answers: {...evalState.answers}, faltasChecked: [...evalState.faltasChecked],
    faltasTexto: evalState.faltasChecked.map(fid=>{const cb=document.querySelector(`.falta-check[data-fid="${fid}"]`); return cb?cb.dataset.txt:fid;}),
    feedback: evalState.feedback, anulado: r.anulado, finalScore: r.anulado?0:r.finalScore,
    itemResults: r.items, createdAt: new Date().toISOString()
  };
  const idx = evaluaciones.findIndex(e=>e.id===id);
  if(idx>=0) evaluaciones[idx]=record; else evaluaciones.push(record);
  evalState.savedId = id;
  await persistEvaluaciones();
  alert('Evaluación guardada correctamente.');
}

function generarPDFEvaluacion(){
  const r = evalState._result || computeResultado(evalState.answers, evalState.faltasChecked);
  const record = {
    nombre: evalState.nombre, celular: evalState.celular, grupo: evalState.grupo, evaluador: evalState.evaluador,
    fecha: evalState.fecha, retenida: evalState.retenida, aQuien: evalState.aQuien, motivo: evalState.motivo, motivoDetalle: evalState.motivoDetalle,
    feedback: evalState.feedback, anulado: r.anulado, finalScore: r.finalScore, itemResults: r.items,
    faltasTexto: evalState.faltasChecked.map(fid=>{const cb=document.querySelector(`.falta-check[data-fid="${fid}"]`); return cb?cb.dataset.txt:fid;})
  };
  const root = document.getElementById('pdf-root');
  const content = document.getElementById('pdf-content');
  const overlay = document.getElementById('pdf-loading-overlay');
  content.innerHTML = buildPdfHTML(record);
  root.style.display = 'block';
  overlay.style.display = 'flex';
  const btn = document.getElementById('btn-pdf');
  const oldLabel = btn ? btn.textContent : '';
  if(btn){ btn.disabled = true; btn.textContent = 'Generando PDF…'; }

  const opt = {
    margin:0, filename:`evaluacion_${(record.nombre||'asesor').replace(/\s+/g,'_')}_${record.fecha}.pdf`,
    image:{type:'jpeg', quality:0.98},
    html2canvas:{scale:2, backgroundColor:'#ffffff', useCORS:true, windowWidth:content.scrollWidth},
    jsPDF:{unit:'pt', format:'a4', orientation:'portrait'}
  };

  const fontsReady = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
  const cleanup = ()=>{
    root.style.display = 'none';
    overlay.style.display = 'none';
    content.innerHTML = '';
    if(btn){ btn.disabled = false; btn.textContent = oldLabel; }
  };

  fontsReady
    .then(()=> new Promise(res=>setTimeout(res, 150))) // let layout settle after display:block
    .then(()=> html2pdf().from(content).set(opt).save())
    .catch(err=>{ console.error('PDF error', err); alert('Ocurrió un error generando el PDF. Inténtalo de nuevo.'); })
    .finally(cleanup);
}

let perfilSeleccionado = null;
let chartPerfil = null;

function evalsDeAsesor(asesor){

}
function avgOf(list){ return list.length? list.reduce((s,e)=>s+(e.anulado?0:e.finalScore),0)/list.length : null; }

function renderPerfiles(){
  document.getElementById('topbar-actions').innerHTML = `<input id="perfil-search" class="field" style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;width:220px;" placeholder="Buscar asesor...">`;

function renderPerfilList(filter){
  const f = (filter||'').toLowerCase();

  document.getElementById('perfil-list').innerHTML = list.length ? list.map(a=>{

    return `<div class="perfil-item" data-id="${a.id}" style="display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:8px;cursor:pointer;${active?'background:var(--blue-soft);':''}">

      <div style="flex:1;min-width:0;"><div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(a.nombre)}</div><div style="font-size:11px;color:var(--text-faint);">${escapeHtml(a.grupo||'Sin grupo')}</div></div>

  document.querySelectorAll('.perfil-item').forEach(el=>{
    el.addEventListener('click', ()=>{

      renderPerfilList(document.getElementById('perfil-search').value);
      renderPerfilDetail(perfilSeleccionado);

function renderPerfilDetail(a){
  const evs = evalsDeAsesor(a).sort((x,y)=>new Date(x.fecha)-new Date(y.fecha));
  const semanaEvs = evs.filter(e=>isInCurrentWeek(e.fecha));
  const mesEvs = evs.filter(e=>isInCurrentMonth(e.fecha));
  const avgSemana = avgOf(semanaEvs), avgMes = avgOf(mesEvs), avgGeneral = avgOf(evs);

  const now = new Date();
  const mesAnteriorEvs = evs.filter(e=>{
    const d=new Date(e.fecha); const m=new Date(now.getFullYear(), now.getMonth()-1,1);
    return d.getMonth()===m.getMonth() && d.getFullYear()===m.getFullYear();
  });
  const avgMesAnterior = avgOf(mesAnteriorEvs);
  let avance = null;
  if(avgMes!==null && avgMesAnterior!==null) avance = avgMes - avgMesAnterior;

  const retenidas = evs.filter(e=>e.retenida===true).length;
  const noRetenidas = evs.filter(e=>e.retenida===false).length;

  document.getElementById('perfil-detail').innerHTML = `
    <div class="card panel">
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
        <div style="width:58px;height:58px;border-radius:50%;background:var(--navy);color:#fff;font-weight:700;font-size:19px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${initials(a.nombre)}</div>
        <div style="flex:1;min-width:200px;">
          <div style="font-family:var(--font-display);font-weight:700;font-size:17px;">${escapeHtml(a.nombre)}</div>
          <div style="font-size:12.5px;color:var(--text-soft);margin-top:2px;">${escapeHtml(a.grupo||'Sin grupo')} · DNI ${escapeHtml(a.dni||'—')}</div>
        </div>
        <div style="text-align:right;font-size:12px;color:var(--text-soft);">
          <div>${escapeHtml(a.telefono||'—')}</div><div>${escapeHtml(a.correo||'—')}</div>
        </div>
      </div>
    </div>
    <div class="cards-row" style="grid-template-columns:repeat(4,1fr);">
      <div class="card kpi"><div class="kpi-label">Promedio semanal</div><div class="kpi-value">${avgSemana!==null?avgSemana.toFixed(1)+'%':'—'}</div><div class="kpi-foot">${semanaEvs.length} evaluación(es)</div></div>
      <div class="card kpi blue"><div class="kpi-label">Promedio mensual</div><div class="kpi-value">${avgMes!==null?avgMes.toFixed(1)+'%':'—'}</div><div class="kpi-foot">${mesEvs.length} evaluación(es)</div></div>
      <div class="card kpi ${avance===null?'':avance>=0?'green':'red'}"><div class="kpi-label">Avance vs. mes anterior</div><div class="kpi-value">${avance===null?'—':(avance>=0?'+':'')+avance.toFixed(1)+'%'}</div><div class="kpi-foot">Variación de promedio</div></div>
      <div class="card kpi"><div class="kpi-label">Retención</div><div class="kpi-value">${retenidas}/${retenidas+noRetenidas}</div><div class="kpi-foot">Llamadas retenidas</div></div>
    </div>
    <div class="card panel">
      <div class="panel-head"><h3>Histórico de notas</h3></div>
      ${evs.length ? '<canvas id="chart-perfil" height="80"></canvas>' : '<div class="empty">Este asesor aún no tiene evaluaciones registradas.</div>'}
    </div>
    <div class="card panel">
      <div class="panel-head"><h3>Evaluaciones</h3></div>
      ${evs.length ? `<table><tr><th>Fecha</th><th>Evaluador</th><th>Retención</th><th>Nota</th></tr>
        ${[...evs].reverse().map(e=>`<tr><td>${fmtDate(e.fecha)}</td><td>${escapeHtml(e.evaluador||'—')}</td>
        <td>${e.retenida===true?'<span class="badge green">Retenida</span>':e.retenida===false?'<span class="badge red">No retenida</span>':'—'}</td>
        <td>${e.anulado?'<span class="badge red">Anulado</span>':`<span class="badge ${scoreColor(e.finalScore)}">${e.finalScore}%</span>`}</td></tr>`).join('')}
      </table>` : '<div class="empty">Sin evaluaciones.</div>'}
    </div>
  `;
  if(evs.length){
    if(chartPerfil) chartPerfil.destroy();
    chartPerfil = new Chart(document.getElementById('chart-perfil'), {
      type:'line',
      data:{ labels: evs.map(e=>fmtDate(e.fecha)), datasets:[{ data: evs.map(e=>e.anulado?0:e.finalScore), borderColor:'#E5147C', backgroundColor:'rgba(229,20,124,.1)', fill:true, tension:.3, pointRadius:3 }]},
      options:{ plugins:{legend:{display:false}}, scales:{ y:{ beginAtZero:true, max:100, grid:{color:'#EEF1F4'} }, x:{grid:{display:false}} } }
    });
  }
}

    </div>
    ${groupsHTML}
  `;

  document.getElementById('btn-importar').onclick = ()=>document.getElementById('excel-input').click();

  document.getElementById('btn-exportar').onclick = exportAsesoresExcel;
  document.getElementById('btn-agregar').onclick = ()=>openAsesorModal(null);
  document.querySelectorAll('.edit-asesor').forEach(b=>b.onclick=()=>openAsesorModal(asesores.find(a=>a.id===b.dataset.id)));
  document.querySelectorAll('.del-asesor').forEach(b=>b.onclick=()=>deleteAsesor(b.dataset.id));
}

function normalizeHeader(h){
  return String(h||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
}
function handleExcelImport(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (ev)=>{
    try{
      const wb = XLSX.read(ev.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      let imported=0, updated=0;
      rows.forEach(row=>{
        const map = {};
        Object.keys(row).forEach(k=>{ map[normalizeHeader(k)] = row[k]; });
        const nombre = String(map['nombre']||map['asesor']||'').trim();
        if(!nombre) return;
        const dni = String(map['dni']||'').trim();
        const telefono = String(map['telefono']||map['celular']||'').trim();
        const correo = String(map['correo']||map['email']||map['correo electronico']||'').trim();
        const grupo = String(map['grupo']||map['equipo']||'').trim();
        const antiguedad = String(map['antiguedad']||'').trim();
        let existing = dni ? asesores.find(a=>a.dni && a.dni===dni) : findAsesorByName(nombre);
        if(existing){
          existing.nombre=nombre||existing.nombre; existing.dni=dni||existing.dni;
          existing.telefono=telefono||existing.telefono; existing.correo=correo||existing.correo; existing.grupo=grupo||existing.grupo;
          existing.antiguedad=antiguedad||existing.antiguedad;
          updated++;
        } else {
          asesores.push({id:uid('as'), nombre, dni, telefono, correo, grupo, antiguedad});
          imported++;
        }
      });
      await persistAsesores();
      renderBaseDatos();
      alert(`Importación completa: ${imported} nuevo(s), ${updated} actualizado(s).`);
    }catch(err){
      console.error(err);
      alert('No se pudo leer el archivo. Verifica que sea un Excel/CSV válido.');
    }
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
}

function exportAsesoresExcel(){
  const data = asesores.map(a=>({Nombre:a.nombre, DNI:a.dni, Telefono:a.telefono, Correo:a.correo, Grupo:a.grupo, Antiguedad:a.antiguedad}));
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Asesores');
  XLSX.writeFile(wb, 'asesores.xlsx');
}

function pctBadgeClass(pct){
  if(pct==null || isNaN(pct)) return 'gray';

  return 'red';
}

function handleRetencionExcelImport(dateStr, e, overlay){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (ev)=>{
    try{
      const wb = XLSX.read(ev.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      const records = [];
      rows.forEach(row=>{
        const map = {};
        Object.keys(row).forEach(k=>{ map[normalizeHeader(k)] = row[k]; });
        const nombre = String(map['nombre']||map['asesor']||'').trim();
        if(!nombre) return;
        const antiguedad = String(map['antiguedad']||'').trim();
        const llamadas = Number(map['llamadas'])||0;
        const retencionesN = Number(map['retenciones'])||0;
        let porcentaje = (map['porcentaje']!==undefined && String(map['porcentaje']).trim()!=='') ? Number(map['porcentaje']) : null;
        if(porcentaje==null || isNaN(porcentaje)) porcentaje = llamadas>0 ? Math.round((retencionesN/llamadas*100)*10)/10 : 0;
        records.push({nombre, antiguedad, llamadas, retenciones:retencionesN, porcentaje});
        if(antiguedad){
          const asesor = findAsesorByName(nombre);
          if(asesor && !asesor.antiguedad) asesor.antiguedad = antiguedad;
        }
      });
      if(!records.length){ alert('No se encontraron filas válidas. Verifica la columna Nombre.'); return; }
      retenciones[dateStr] = records;
      await persistRetenciones();
      await persistAsesores();
      overlay.remove();
      renderRetenciones();
    }catch(err){
      console.error(err);
      alert('No se pudo leer el archivo. Verifica que sea un Excel/CSV válido.');
    }
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
}

/* ============================== MÓDULO: REPORTES ============================== */
function flatRetenciones(){
  const out=[];
  Object.keys(retenciones).forEach(dateStr=>{
    (retenciones[dateStr]||[]).forEach(r=>out.push({...r, fecha:dateStr}));
  });
  return out;
}
function getPeriodRange(type, ref){
  if(type==='todo') return null;
  if(type==='semana'){
    const start = new Date(ref); start.setDate(ref.getDate()-ref.getDay()); start.setHours(0,0,0,0);
    const end = new Date(start); end.setDate(start.getDate()+7);
    return {start, end};
  }
  const start = new Date(ref.getFullYear(), ref.getMonth(), 1);
  const end = new Date(ref.getFullYear(), ref.getMonth()+1, 1);
  return {start, end};
}
function inRange(dateStr, range){
  if(!range) return true;
  const d = new Date(dateStr); if(isNaN(d)) return false;
  return d>=range.start && d<range.end;
}
function periodLabel(type, ref){
  if(type==='todo') return 'Todo el historial';
  const r = getPeriodRange(type, ref);
  if(type==='semana'){
    const endIncl = new Date(r.end); endIncl.setDate(endIncl.getDate()-1);
    const fmt = (d)=>d.toLocaleDateString('es-PE',{day:'2-digit',month:'short'});
    return `Semana ${fmt(r.start)} – ${fmt(endIncl)} ${endIncl.getFullYear()}`;
  }
  let l = ref.toLocaleDateString('es-PE',{month:'long', year:'numeric'});
  return l.charAt(0).toUpperCase()+l.slice(1);
}
function periodFileTag(){
  if(reportesPeriodType==='todo') return 'historico';
  const r = getPeriodRange(reportesPeriodType, reportesPeriodRef);
  return reportesPeriodType+'_'+r.start.toISOString().slice(0,10);
}
function shiftReportesPeriod(dir){
  const d = new Date(reportesPeriodRef);
  if(reportesPeriodType==='semana') d.setDate(d.getDate()+7*dir);
  else if(reportesPeriodType==='mes') d.setMonth(d.getMonth()+dir);
  reportesPeriodRef = d;
  renderReportes();
}
function clasificarCuadrante(notaCal, pctRet){
  if(notaCal==null || pctRet==null) return {label:'Sin datos', cls:'gray'};
  const t = reportesThresholds;
  if(notaCal>=t.qAlta && pctRet>=t.rAlta) return {label:'Q1 Élite', cls:'green'};
  if(pctRet < t.rCritica) return {label:'Q4 Crítico', cls:'red'};
  if(notaCal < t.qBaja) return {label:'Q3', cls:'amber'};
  return {label:'Q2', cls:'amber'};
}

function buildCruceData(){
  const range = getPeriodRange(reportesPeriodType, reportesPeriodRef);
  const evs = evaluaciones.filter(e=>!e.anulado && e.nombre && inRange(e.fecha, range));
  const rets = flatRetenciones().filter(r=>r.nombre && inRange(r.fecha, range));
  const map = new Map();
  const ensure = (nombre)=>{
    const key = nombre.trim().toLowerCase();
    if(!map.has(key)){
      const asesor = findAsesorByName(nombre);
      map.set(key, {nombre: asesor?asesor.nombre:nombre, sup: asesor?(asesor.grupo||'—'):'—', evals:[], retRecords:[]});
    }
    return map.get(key);
  };
  evs.forEach(e=>ensure(e.nombre).evals.push(e));
  rets.forEach(r=>ensure(r.nombre).retRecords.push(r));

  const rows = [...map.values()].filter(v=>v.evals.length || v.retRecords.length).map(v=>{
    const diana = v.evals.length;
    const notaCal = v.evals.length ? v.evals.reduce((s,e)=>s+e.finalScore,0)/v.evals.length : null;
    const totalLlam = v.retRecords.reduce((s,r)=>s+(Number(r.llamadas)||0),0);
    const totalRet = v.retRecords.reduce((s,r)=>s+(Number(r.retenciones)||0),0);
    const pctRet = totalLlam>0 ? (totalRet/totalLlam*100) : null;
    return {nombre:v.nombre, sup:v.sup, diana, notaCal, pctRet, llam:totalLlam};
  });
  rows.sort((a,b)=>a.nombre.localeCompare(b.nombre));
  return rows;
}

function buildPivotData(kind){
  const range = getPeriodRange(reportesPeriodType, reportesPeriodRef);
  const evs = evaluaciones.filter(e=>!e.anulado && e.nombre && inRange(e.fecha, range));
  const cols = [];
  if(kind==='item'){ PAUTA.forEach(cat=>cat.items.forEach(it=>cols.push({id:it.id, nombre:it.nombre}))); }
  else { PAUTA.forEach(cat=>cat.items.forEach(it=>it.sub.forEach(s=>cols.push({id:s.id, nombre:s.t})))); }

  const map = new Map();
  const ensure = (nombre)=>{
    const key = nombre.trim().toLowerCase();
    if(!map.has(key)){
      const asesor = findAsesorByName(nombre);
      map.set(key, {nombre: asesor?asesor.nombre:nombre, sup: asesor?(asesor.grupo||'—'):'—', acc:{}});
    }
    return map.get(key);
  };
  evs.forEach(e=>{
    const row = ensure(e.nombre);
    if(kind==='item'){
      if(!e.itemResults) return;
      cols.forEach(c=>{
        const res = e.itemResults[c.id];
        if(res && res.complete){
          if(!row.acc[c.id]) row.acc[c.id]={cumple:0,total:0};
          row.acc[c.id].total++; if(res.cumple) row.acc[c.id].cumple++;
        }
      });
    } else {
      if(!e.answers) return;
      cols.forEach(c=>{
        const val = e.answers[c.id];
        if(val===true || val===false){
          if(!row.acc[c.id]) row.acc[c.id]={cumple:0,total:0};
          row.acc[c.id].total++; if(val===true) row.acc[c.id].cumple++;
        }
      });
    }
  });

  const rows = [...map.values()].filter(v=>Object.keys(v.acc).length>0).map(v=>{
    const values = cols.map(c=>{ const a=v.acc[c.id]; return a? (a.cumple/a.total*100) : null; });
    return {nombre:v.nombre, sup:v.sup, values};
  });
  rows.sort((a,b)=>a.nombre.localeCompare(b.nombre));
  return {headers: cols.map(c=>c.nombre), rows};
}

function renderReportes(){
  document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-primary btn-sm" id="reportes-export">Descargar Excel</button>`;
  const periodoControlsHTML = reportesPeriodType!=='todo' ? `
    <button class="btn btn-outline btn-sm" id="reportes-prev">‹</button>
    <span style="font-size:12.5px;font-weight:600;min-width:190px;text-align:center;display:inline-block;">${periodLabel(reportesPeriodType, reportesPeriodRef)}</span>
    <button class="btn btn-outline btn-sm" id="reportes-next">›</button>
  ` : `<span style="font-size:12.5px;font-weight:600;">${periodLabel('todo')}</span>`;

  document.getElementById('view-reportes').innerHTML = `
    <div class="card panel">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
        <div class="dash-tipo-toggle" id="reportes-tabs">
          <button class="dash-tipo-btn ${reportesTab==='cruce'?'active':''}" data-tab="cruce">Calidad vs Retención</button>
          <button class="dash-tipo-btn ${reportesTab==='item'?'active':''}" data-tab="item">Nota por ítem</button>
          <button class="dash-tipo-btn ${reportesTab==='subitem'?'active':''}" data-tab="subitem">Nota por sub-ítem</button>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <div class="dash-tipo-toggle" id="reportes-periodo">
            <button class="dash-tipo-btn ${reportesPeriodType==='semana'?'active':''}" data-periodo="semana">Semana</button>
            <button class="dash-tipo-btn ${reportesPeriodType==='mes'?'active':''}" data-periodo="mes">Mes</button>
            <button class="dash-tipo-btn ${reportesPeriodType==='todo'?'active':''}" data-periodo="todo">Todo</button>
          </div>
          ${periodoControlsHTML}
        </div>
      </div>
    </div>
    <div id="reportes-body"></div>
  `;

  document.querySelectorAll('#reportes-tabs .dash-tipo-btn').forEach(b=>b.onclick=()=>{ reportesTab=b.dataset.tab; renderReportes(); });
  document.querySelectorAll('#reportes-periodo .dash-tipo-btn').forEach(b=>b.onclick=()=>{ reportesPeriodType=b.dataset.periodo; renderReportes(); });
  if(reportesPeriodType!=='todo'){
    document.getElementById('reportes-prev').onclick = ()=>shiftReportesPeriod(-1);
    document.getElementById('reportes-next').onclick = ()=>shiftReportesPeriod(1);
  }

  if(reportesTab==='cruce') renderCruceReport();
  if(reportesTab==='item') renderPivotReport('item', 'Nota por ítem', 'Porcentaje de cumplimiento por ítem de evaluación');
  if(reportesTab==='subitem') renderPivotReport('subitem', 'Nota por sub-ítem', 'Porcentaje de cumplimiento por sub-ítem de evaluación');

  document.getElementById('reportes-export').onclick = ()=>{
    if(reportesTab==='cruce') exportCruceExcel();
    if(reportesTab==='item') exportPivotExcel('item', 'Nota por item', 'nota_por_item');
    if(reportesTab==='subitem') exportPivotExcel('subitem', 'Nota por subitem', 'nota_por_subitem');
  };
}

function renderCruceReport(){
  const rows = buildCruceData();
  const totalLlam = rows.reduce((s,r)=>s+r.llam,0);
  const t = reportesThresholds;
  document.getElementById('reportes-body').innerHTML = `
    <div class="card panel">
      <div class="panel-head">
        <div>
          <h3>Nota de Calidad vs % Retención</h3>
          <span class="hint">Cruce individual por asesor · ${rows.length} asesor(es) · ${totalLlam.toLocaleString('es-PE')} llamadas gestionadas</span>
        </div>
      </div>
      <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:14px;padding:10px 12px;background:var(--blue-soft);border:1px solid #CFE2F3;border-radius:8px;font-size:11.5px;color:var(--navy-2);">
        <b>Umbrales del cuadrante:</b>
        <label>Calidad alta ≥ <input type="number" id="th-qalta" value="${t.qAlta}" style="width:50px;padding:3px 5px;border:1px solid var(--border);border-radius:6px;">%</label>
        <label>Calidad baja &lt; <input type="number" id="th-qbaja" value="${t.qBaja}" style="width:50px;padding:3px 5px;border:1px solid var(--border);border-radius:6px;">%</label>
        <label>Retención alta ≥ <input type="number" id="th-ralta" value="${t.rAlta}" style="width:50px;padding:3px 5px;border:1px solid var(--border);border-radius:6px;">%</label>
        <label>Retención crítica &lt; <input type="number" id="th-rcritica" value="${t.rCritica}" style="width:50px;padding:3px 5px;border:1px solid var(--border);border-radius:6px;">%</label>
        <button class="btn btn-dark btn-sm" id="th-apply">Aplicar</button>
      </div>
      <div style="font-size:11px;color:var(--text-faint);margin-bottom:8px;">"Diana" = N° de evaluaciones (muestra) realizadas al asesor en el periodo · "Sup." = grupo/supervisor asignado en Base de datos.</div>
      <div style="overflow-x:auto;">
      <table>
        <tr><th>Asesor</th><th>Diana</th><th>Sup.</th><th>Nota Cal.</th><th>% Ret.</th><th>Llam.</th><th>Análisis</th></tr>
        ${rows.length? rows.map(r=>{
          const q = clasificarCuadrante(r.notaCal, r.pctRet);
          return `<tr>
            <td>${escapeHtml(r.nombre)}</td>
            <td style="text-align:center;">${r.diana||'—'}</td>
            <td>${escapeHtml(r.sup)}</td>
            <td style="font-weight:700;color:${colorForPct(r.notaCal)};">${r.notaCal!=null?r.notaCal.toFixed(1)+'%':'—'}</td>
            <td style="font-weight:700;color:${colorForPct(r.pctRet)};">${r.pctRet!=null?r.pctRet.toFixed(1)+'%':'—'}</td>
            <td style="text-align:right;">${r.llam||'—'}</td>
            <td><span class="badge ${q.cls}">${q.label}</span></td>
          </tr>`;
        }).join('') : '<tr><td colspan="7" class="empty">Sin datos en el periodo seleccionado.</td></tr>'}
      </table>
      </div>
    </div>
  `;
  document.getElementById('th-apply').onclick = ()=>{
    reportesThresholds = {
      qAlta: Number(document.getElementById('th-qalta').value)||90,
      qBaja: Number(document.getElementById('th-qbaja').value)||60,
      rAlta: Number(document.getElementById('th-ralta').value)||60,
      rCritica: Number(document.getElementById('th-rcritica').value)||45
    };
    renderCruceReport();
  };
}

function renderPivotReport(kind, title, hint){
  const pivot = buildPivotData(kind);
  document.getElementById('reportes-body').innerHTML = `
    <div class="card panel">
      <div class="panel-head"><div><h3>${title}</h3><span class="hint">${hint} · ${periodLabel(reportesPeriodType, reportesPeriodRef)} · ${pivot.rows.length} asesor(es)</span></div></div>
      <div style="overflow-x:auto;">
      <table style="min-width:${300+pivot.headers.length*110}px;">
        <tr><th style="position:sticky;left:0;background:var(--card);z-index:1;">Asesor</th><th>Sup.</th>${pivot.headers.map(h=>`<th>${escapeHtml(h)}</th>`).join('')}</tr>
        ${pivot.rows.length? pivot.rows.map(r=>`<tr>
          <td style="position:sticky;left:0;background:var(--card);font-weight:600;">${escapeHtml(r.nombre)}</td>
          <td>${escapeHtml(r.sup)}</td>
          ${r.values.map(v=>`<td style="font-weight:700;color:${colorForPct(v)};">${v!=null?v.toFixed(0)+'%':'—'}</td>`).join('')}
        </tr>`).join('') : `<tr><td colspan="${pivot.headers.length+2}" class="empty">Sin datos en el periodo seleccionado.</td></tr>`}
      </table>
      </div>
    </div>
  `;
}

function exportCruceExcel(){
  const rows = buildCruceData();
  const data = rows.map(r=>{
    const q = clasificarCuadrante(r.notaCal, r.pctRet);
    return {
      Asesor:r.nombre, Diana:r.diana, Supervisor:r.sup,
      'Nota Cal. (%)': r.notaCal!=null? Math.round(r.notaCal*10)/10 : '',
      '% Ret.': r.pctRet!=null? Math.round(r.pctRet*10)/10 : '',
      Llamadas: r.llam, Analisis: q.label
    };
  });
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Calidad vs Retencion');
  XLSX.writeFile(wb, `calidad_vs_retencion_${periodFileTag()}.xlsx`);
}

function exportPivotExcel(kind, sheetName, filePrefix){
  const pivot = buildPivotData(kind);
  const data = pivot.rows.map(r=>{
    const obj = {Asesor:r.nombre, Supervisor:r.sup};
    pivot.headers.forEach((h,i)=>{ obj[h] = r.values[i]!=null ? Math.round(r.values[i]*10)/10 : ''; });
    return obj;
  });
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName);
  XLSX.writeFile(wb, `${filePrefix}_${periodFileTag()}.xlsx`);
}

/* ============================== INIT ============================== */
async function initApp(){
  const dot = document.getElementById('storage-dot');
  const label = document.getElementById('storage-label');
  await loadAll();
  if(Storage.mode === 'claude'){
    dot.classList.remove('off'); label.textContent = 'Datos sincronizados (Claude.ai)';
  } else if(Storage.mode === 'firebase'){
    dot.classList.remove('off'); label.textContent = 'Datos sincronizados (Firebase)';
  } else {
    dot.classList.add('off'); label.textContent = 'Sin almacenamiento — configura Firebase';
  }
  renderDashboard();
}
initApp();
</script>
