<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Calidad · Retención</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>

<style>
:root{
  --navy:#13233A;
  --navy-2:#1B324E;
  --blue:#2E6DA4;
  --blue-soft:#E9F1FA;
  --green:#1E8E5A;
  --green-soft:#E5F5ED;
  --red:#C0392B;
  --red-soft:#FBEAE9;
  --amber:#C8862A;
  --amber-soft:#FBF1E1;
  --bg:#F3F5F8;
  --card:#FFFFFF;
  --border:#E1E5EB;
  --text:#1B232E;
  --text-soft:#646E7C;
  --text-faint:#9BA4B0;
  --radius:12px;
  --radius-sm:8px;
  --font-display:'Sora',sans-serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --shadow:0 1px 2px rgba(19,35,58,.06), 0 4px 16px rgba(19,35,58,.05);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:14px;}
::selection{background:#BFD9EF;}

/* ===== LAYOUT ===== */
.app{display:flex;min-height:100vh;}
.sidebar{
  width:240px;flex-shrink:0;background:var(--navy);
  display:flex;flex-direction:column;padding:22px 14px;
  position:fixed;top:0;left:0;height:100vh;z-index:50;
}
.brand{display:flex;align-items:center;gap:10px;padding:6px 10px 26px;}
.brand-mark{
  width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--blue),#5FA8DC);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:var(--font-display);font-weight:800;color:#fff;font-size:15px;
}
.brand-text{line-height:1.15;}
.brand-text strong{display:block;font-family:var(--font-display);color:#fff;font-size:14.5px;font-weight:700;letter-spacing:.2px;}
.brand-text span{display:block;color:#8EA3BC;font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;margin-top:2px;}

.nav{display:flex;flex-direction:column;gap:4px;margin-top:6px;}
.nav-btn{
  display:flex;align-items:center;gap:11px;padding:10px 12px;border:none;background:transparent;
  color:#AEBED3;border-radius:var(--radius-sm);font-size:13.5px;font-weight:500;text-align:left;
  transition:background .15s,color .15s;
}
.nav-btn svg{width:18px;height:18px;flex-shrink:0;opacity:.85;}
.nav-btn:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-btn.active{background:var(--blue);color:#fff;}
.nav-btn.active svg{opacity:1;}
.nav-num{font-family:var(--font-mono);font-size:10.5px;color:#5E7390;width:16px;flex-shrink:0;}
.nav-btn.active .nav-num{color:rgba(255,255,255,.65);}

.sidebar-foot{margin-top:auto;padding:12px 10px 2px;border-top:1px solid rgba(255,255,255,.08);}
.storage-pill{display:flex;align-items:center;gap:7px;font-size:11px;color:#8EA3BC;padding:8px 2px 0;}
.storage-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
.storage-dot.off{background:var(--amber);}

.main{flex:1;margin-left:240px;min-height:100vh;display:flex;flex-direction:column;}
.topbar{
  height:64px;flex-shrink:0;background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:30;
}
.topbar h1{font-family:var(--font-display);font-size:18px;font-weight:700;margin:0;}
.topbar .sub{color:var(--text-soft);font-size:12.5px;margin-top:1px;}
.content{padding:26px 28px 60px;flex:1;}
.view{display:none;}
.view.active{display:block;animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* ===== GENERIC ===== */
.grid{display:grid;gap:18px;}
.cards-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
.kpi{padding:18px 20px;}
.kpi-label{font-size:12px;color:var(--text-soft);font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.kpi-value{font-family:var(--font-display);font-size:28px;font-weight:800;margin-top:6px;}
.kpi-foot{font-size:12px;color:var(--text-faint);margin-top:4px;}
.kpi.green .kpi-value{color:var(--green);}
.kpi.red .kpi-value{color:var(--red);}
.kpi.blue .kpi-value{color:var(--blue);}

.panel{padding:20px 22px;margin-bottom:20px;}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.panel-head h3{font-family:var(--font-display);font-size:15px;font-weight:700;margin:0;}
.panel-head .hint{font-size:12px;color:var(--text-faint);}
.two-col{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--text-soft);font-weight:700;padding:9px 10px;border-bottom:1px solid var(--border);}
td{padding:10px;border-bottom:1px solid #EEF1F4;}
tr:last-child td{border-bottom:none;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11.5px;font-weight:600;}
.badge.green{background:var(--green-soft);color:var(--green);}
.badge.red{background:var(--red-soft);color:var(--red);}
.badge.amber{background:var(--amber-soft);color:var(--amber);}
.badge.gray{background:#EEF1F4;color:var(--text-soft);}

.stat-row{display:flex;align-items:center;gap:12px;padding:8px 4px;border-bottom:1px solid #EEF1F4;}
.stat-row:last-child{border-bottom:none;}
.stat-label{flex:0 0 230px;font-size:12.5px;font-weight:600;color:var(--text);line-height:1.3;}
.stat-label .stat-sub{display:block;font-size:10.5px;font-weight:500;color:var(--text-faint);margin-top:1px;}
.stat-bar-track{flex:1;height:8px;background:#EEF1F4;border-radius:99px;overflow:hidden;min-width:60px;}
.stat-bar-fill{height:100%;border-radius:99px;transition:width .3s;}
.stat-pct{flex:0 0 50px;text-align:right;font-family:var(--font-mono);font-weight:700;font-size:12.5px;}
.stat-n{flex:0 0 64px;text-align:right;font-size:10.5px;color:var(--text-faint);}
.stat-scroll{max-height:380px;overflow-y:auto;}
.motivo-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #EEF1F4;}
.motivo-row:last-child{border-bottom:none;}
.motivo-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
@media (max-width:700px){ .stat-label{flex-basis:140px;font-size:11.5px;} }

.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;border:1px solid transparent;transition:filter .12s,background .12s;}
.btn:hover{filter:brightness(.96);}
.btn-primary{background:var(--blue);color:#fff;}
.btn-dark{background:var(--navy);color:#fff;}
.btn-outline{background:#fff;color:var(--text);border-color:var(--border);}
.btn-outline:hover{background:#F7F9FB;}
.btn-danger-outline{background:#fff;color:var(--red);border-color:#F1C9C4;}
.btn-success{background:var(--green);color:#fff;}
.btn-sm{padding:6px 11px;font-size:12px;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-soft);margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;color:var(--text);
}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid #BFD9EF;border-color:var(--blue);}
.field textarea{resize:vertical;min-height:64px;}
.field-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}

.empty{padding:32px 20px;text-align:center;color:var(--text-faint);font-size:13px;}
.empty svg{width:36px;height:36px;opacity:.4;margin-bottom:10px;}

::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:#D6DCE3;border-radius:6px;}

@media (max-width:980px){
  .sidebar{display:none;}
  .main{margin-left:0;}
  .cards-row{grid-template-columns:repeat(2,1fr);}
  .two-col{grid-template-columns:1fr;}
  .field-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="app">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">CC</div>

</div>

<script>
/* ============================== DATA: PAUTA DE EVALUACIÓN ============================== */

      {id:'gestiona_tiempos', t:'Gestiona adecuadamente los tiempos'}
    ]},
    { id:'registro_validacion', nombre:'Registro y validación', peso:10, sub:[
      {id:'tipificacion_registro', t:'Tipificación y registro de datos en sistemas'}
    ]}
  ]},
  { cat:'ENC', catLabel:'Encuesta de atención', catPeso:30, items:[
    { id:'protocolo_atencion', nombre:'Protocolo de atención', peso:5, sub:[

      {id:'uso_muletillas', t:'Uso de muletillas'},
      {id:'personalizacion', t:'Personalización'}
    ]},
    { id:'habilidades_comunicativas', nombre:'Habilidades comunicativas', peso:25, sub:[
      {id:'claridad_informacion', t:'Claridad en la información'},
      {id:'escucha_activa', t:'Escucha activa'},
      {id:'empatia_sonrisa', t:'Empatía y sonrisa telefónica'}
    ]}
  ]}
];
const PAUTA_TOTAL = PAUTA.reduce((s,c)=>s+c.items.reduce((s2,i)=>s2+i.peso,0),0);

const FALTAS_GRAVES = [
  { cat:'Información falsa', items:[
    'Ofrecimiento de un producto y/o servicio no existente',
    'Entrega información o argumentos falsos para evitar la baja'
  ]},
  { cat:'Gestión indebida', items:[
    'Genera retención con usuario y no titular',
    'Genera retención con menor de edad',
    'Genera retención suplantando la identidad del titular',
    'No realiza el registro de la baja en los sistemas intencionalmente',
    'Se concreta traslado en zonas prohibidas o sin cobertura',
    'Registra en sistemas promoción distinta a la ofrecida',
    'No realiza la devolución inmediata',
    'No realiza los intentos de timbrado (gestión out)',
    'Registra retención en sistema sin encontrarse en línea con el cliente',
    'Registra migración como retención',
    'Gestiona tickets no asignados',
    'Retención sin gestión previa',
    'Registra retenido sin intención de baja'
  ]},
  { cat:'Mala actitud', items:[
    'Asesor falta el respeto al cliente (levanta la voz, insulta o agrede, se expresa irónica o sarcásticamente, amenaza)',
    'Abandona o corta llamada sin finalizar atención'
  ]}
];

const MOTIVO_OPTIONS = {
  Agente: [
    'ASESOR CORTA LA LLAMADA','FALTA DE HABILIDAD COMERCIAL','NO ATIENDE CASO O LLAMADA','NO DEVUELVE LA LLAMADA',
    'NO SONDEA / NO REBATE','REBATE ERRADO O INCOMPLETO','SIN INTENTO DE LLAMADA','COMENTARIOS INADECUADOS SOBRE LA EMPRESA',
    'ERROR EN TIEMPO DE RESPUESTA','INDUCE A LA BAJA O RECLAMO','MALA ACTITUD COMERCIAL','ERROR EN USO DE PRE-CIERRE',
    'MALA ACTITUD GENERAL','GESTION INDEBIDA','BRINDA INFORMACION FALSA','OTROS ASESOR'
  ],
  Cliente: [
    'PERFIL DE USUARIO','CLIENTE OCUPADO','CONSULTA ATC / SOPORTE / RECLAMOS','DUDA O RECLAMO DE FACTURACION',
    'TV NO COMPATIBLE CON DGO','CLIENTE INDICA QUE CONSULTARA','CONTRATO VIGENTE CON OPERADOR','CLIENTE CORTA LA LLAMADA',
    'DESCONOCE DIRECCION','DESEA PLAN MENOR','DESEA TV CON DECO (SOLO TV)','REQUIERE IP PUBLICA',
    'NO CONTESTA / BUZON DE VOZ','NO DESEA EL SERVICIO','VIAJE','MUDANZA','MOTIVO ECONOMICO','DESASTRES NATURALES','OTROS CLIENTE'
  ],
  Proceso: [
    'FUERA DE COBERTURA','CLIENTE DESEA TV','CLIENTE DESEA FIJO','CLIENTE DESEA REPETIDOR','CLIENTE NO APLICA PARA DESCUENTO',
    'INCUMPLIMIENTO DE SERVICIO TECNICO','COBRO POR EQUIPO DAÑADO','FALLAS REITERATIVAS EN EL SERVICIO','INCREMENTO DE TARIFARIO',
    'MALA GESTION DE VENTAS','MALA EXPERIENCIA CON LA MARCA','OFERTA DE LA COMPETENCIA','OTROS PROCESO'
  ]
};

/* ============================== FIREBASE CONFIG ============================== */
// 1) Ve a Firebase Console > Configuración del proyecto > Tus apps > SDK setup and configuration
// 2) Copia tu firebaseConfig y reemplaza el objeto de abajo.
// 3) Si dejas los valores de ejemplo, la app funcionará igual dentro de Claude.ai
//    (usa el guardado interno), pero NO guardará datos una vez publicada en la web.
const firebaseConfig = {
  apiKey: "AIzaSyDO0dab6Q_nBxIn22ClRyX93ML6-5r-w3o",
  authDomain: "calidad-callup.firebaseapp.com",
  projectId: "calidad-callup",
  storageBucket: "calidad-callup.firebasestorage.app",
  messagingSenderId: "628278203576",
  appId: "1:628278203576:web:966294e9bfb2afc7db104d",
  measurementId: "G-VP6XW29PCG"
};
const FIREBASE_CONFIGURED = firebaseConfig.apiKey !== "TU_API_KEY";

let db = null;
if(FIREBASE_CONFIGURED && typeof firebase !== 'undefined'){
  try{
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
  }catch(e){ console.error('Error inicializando Firebase', e); }
}

/* ============================== STORAGE ============================== */
// Modo 1: dentro de Claude.ai usa window.storage (persistencia nativa del chat).
// Modo 2: fuera de Claude.ai (sitio publicado) usa Firebase Firestore.
const Storage = {
  mode: (typeof window.storage !== 'undefined') ? 'claude' : (db ? 'firebase' : 'none'),
  get available(){ return this.mode !== 'none'; },

  async get(key, fallback, shared){
    if(this.mode === 'claude'){
      try{
        const r = await window.storage.get(key, shared);
        return r && r.value ? JSON.parse(r.value) : fallback;
      }catch(e){ return fallback; }
    }
    if(this.mode === 'firebase'){
      try{
        const doc = await db.collection('calidad_data').doc(key).get();
        return doc.exists ? JSON.parse(doc.data().value) : fallback;
      }catch(e){ console.error('Firestore get error', e); return fallback; }
    }
    return fallback;
  },

  async set(key, value, shared){
    if(this.mode === 'claude'){
      try{ await window.storage.set(key, JSON.stringify(value), shared); return true; }
      catch(e){ console.error('storage.set error', e); return false; }
    }
    if(this.mode === 'firebase'){
      try{ await db.collection('calidad_data').doc(key).set({ value: JSON.stringify(value), updatedAt: new Date().toISOString() }); return true; }
      catch(e){ console.error('Firestore set error', e); return false; }
    }
    return false;
  }
};

/* ============================== STATE ============================== */
let asesores = [];       // {id,nombre,dni,telefono,correo,grupo}
let evaluaciones = [];

function uid(prefix){ return (prefix||'id')+'_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8); }
function fmtDate(d){
  if(!d) return '—';
  const dt = (d instanceof Date)? d : new Date(d);
  if(isNaN(dt)) return '—';
  return dt.toLocaleDateString('es-PE',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function todayISO(){ const d=new Date(); return d.toISOString().slice(0,10); }
function escapeHtml(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function initials(name){
  if(!name) return '--';
  const parts = name.trim().split(/\s+/);
  return ((parts[0]||'')[0]||'') + ((parts[1]||'')[0]||'');
}
function scoreColor(score){
  if(score>=90) return 'green';
  if(score>=70) return 'amber';
  return 'red';
}
function getGroups(){
  return [...new Set(asesores.map(a=>a.grupo).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
}
function findAsesorByName(name){
  if(!name) return null;
  const n = name.trim().toLowerCase();
  return asesores.find(a=>a.nombre.trim().toLowerCase()===n) || null;
}

/* ============================== PERSISTENCE ============================== */
async function persistAsesores(){ await Storage.set('asesores', asesores, true); }
async function persistEvaluaciones(){ await Storage.set('evaluaciones', evaluaciones, true); }

async function loadAll(){
  asesores = await Storage.get('asesores', [], true);
  evaluaciones = await Storage.get('evaluaciones', [], true);
}

/* ============================== SCORING ============================== */
function evaluarItem(item, answers){
  const allAnswered = item.sub.every(s => answers[s.id]===true || answers[s.id]===false);
  if(!allAnswered) return {complete:false, cumple:null, score:0};
  const cumple = item.sub.every(s => answers[s.id]===true);
  return {complete:true, cumple, score: cumple ? item.peso : 0};
}
function computeResultado(answers, faltasChecked){
  if(faltasChecked && faltasChecked.length>0){
    return {anulado:true, finalScore:0, items:{}, allComplete:true};
  }
  let total=0, allComplete=true;
  const items={};
  PAUTA.forEach(cat=>cat.items.forEach(item=>{
    const r = evaluarItem(item, answers);
    items[item.id]=r;
    if(!r.complete) allComplete=false;
    total += r.score;
  }));
  return {anulado:false, finalScore: Math.round(total*100)/100, items, allComplete};
}

function isInCurrentWeek(dateStr){
  const d = new Date(dateStr); if(isNaN(d)) return false;
  const now = new Date();
  const start = new Date(now); start.setDate(now.getDate()-now.getDay()); start.setHours(0,0,0,0);
  const end = new Date(start); end.setDate(start.getDate()+7);
  return d>=start && d<end;
}
function isInCurrentMonth(dateStr){
  const d = new Date(dateStr); if(isNaN(d)) return false;
  const now = new Date();
  return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
}

function colorForPct(pct){
  if(pct===null || pct===undefined) return '#D6DCE3';
  if(pct>=90) return 'var(--green)';
  if(pct>=70) return 'var(--amber)';
  return 'var(--red)';
}
function statBarRowHTML(label, tag, pct, n){
  const color = colorForPct(pct);
  const pctText = (pct===null||pct===undefined) ? '—' : pct.toFixed(0)+'%';
  return `<div class="stat-row">
    <div class="stat-label">${escapeHtml(label)}${tag?`<span class="stat-sub">${escapeHtml(tag)}</span>`:''}</div>
    <div class="stat-bar-track"><div class="stat-bar-fill" style="width:${pct?Math.min(pct,100):0}%;background:${color};"></div></div>
    <div class="stat-pct" style="color:${color};">${pctText}</div>
    <div class="stat-n">${n} eval.</div>
  </div>`;
}

function computeCategoriaStats(){
  return PAUTA.map(cat=>{
    let sum=0, n=0;
    evaluaciones.forEach(e=>{
      if(e.anulado || !e.itemResults) return;
      let catScore=0, complete=true;
      cat.items.forEach(item=>{
        const res = e.itemResults[item.id];
        if(res && res.complete) catScore += res.score; else complete=false;
      });
      if(complete){ sum += (catScore/cat.catPeso*100); n++; }
    });
    return { label: cat.catLabel, tag: cat.cat+' · peso '+cat.catPeso+'%', pct: n? sum/n : null, n };
  });
}
function computeItemStats(){
  const rows=[];
  PAUTA.forEach(cat=>cat.items.forEach(item=>{
    let cumple=0, total=0;
    evaluaciones.forEach(e=>{
      if(e.anulado || !e.itemResults) return;
      const res = e.itemResults[item.id];
      if(res && res.complete){ total++; if(res.cumple) cumple++; }
    });
    rows.push({ label:item.nombre, tag:cat.cat+' · peso '+item.peso+'%', pct: total? (cumple/total*100) : null, n:total });
  }));
  return rows;
}
function computeSubitemStats(){
  const rows=[];
  PAUTA.forEach(cat=>cat.items.forEach(item=>item.sub.forEach(s=>{
    let cumple=0, total=0;
    evaluaciones.forEach(e=>{
      if(e.anulado || !e.answers) return;
      const val = e.answers[s.id];
      if(val===true || val===false){ total++; if(val===true) cumple++; }
    });
    rows.push({ label:s.t, tag:item.nombre, pct: total? (cumple/total*100) : null, n:total });
  })));
  return rows.sort((a,b)=>{
    if(a.pct===null) return 1;
    if(b.pct===null) return -1;
    return a.pct-b.pct;
  });
}
function computeMotivoStats(){
  const noRet = evaluaciones.filter(e=>e.retenida===false);
  const counts = {Agente:0, Cliente:0, Proceso:0};
  let sinEspecificar = 0;
  noRet.forEach(e=>{
    if(e.aQuien && counts.hasOwnProperty(e.aQuien)) counts[e.aQuien]++; else sinEspecificar++;
  });
  return { counts, sinEspecificar, total: noRet.length };
}

function weekKey(dateStr){
  const d = new Date(dateStr); if(isNaN(d)) return null;
  const start = new Date(d); start.setDate(d.getDate()-d.getDay()); start.setHours(0,0,0,0);
  return start.toISOString().slice(0,10);
}
function monthKey(dateStr){
  const d = new Date(dateStr); if(isNaN(d)) return null;
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function weekLabel(k){ return new Date(k).toLocaleDateString('es-PE',{day:'2-digit',month:'short'}); }
function monthLabel(k){ const [y,m]=k.split('-'); return new Date(parseInt(y),parseInt(m)-1,1).toLocaleDateString('es-PE',{month:'short',year:'2-digit'}); }
function computeBucketedAvg(keyFn, limit){
  const map = {};
  evaluaciones.forEach(e=>{
    const k = keyFn(e.fecha);
    if(!k) return;
    if(!map[k]) map[k]={sum:0,n:0};
    if(!e.anulado){ map[k].sum += e.finalScore; map[k].n++; }
  });
  const keys = Object.keys(map).sort();
  return keys.slice(-limit).map(k=>({ key:k, avg: map[k].n? map[k].sum/map[k].n : null, n: map[k].n }));
}

        overlay.style.display = 'flex';
        const opt = {
          margin:0, filename:`evaluacion_${(ev.nombre||'asesor').replace(/\s+/g,'_')}_${ev.fecha}.pdf`,
          image:{type:'jpeg', quality:0.98},
          html2canvas:{scale:2, backgroundColor:'#ffffff', useCORS:true, windowWidth:content.scrollWidth},
          jsPDF:{unit:'pt', format:'a4', orientation:'portrait'}
        };
        const fontsReady = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
        fontsReady
          .then(()=>new Promise(res=>setTimeout(res,150)))
          .then(()=>html2pdf().from(content).set(opt).save())
          .finally(()=>{ root.style.display='none'; overlay.style.display='none'; content.innerHTML=''; });
      };
    });
  }
}

function ringSVG(score, size){
  size = size||86;
  const r = (size/2)-7, c = 2*Math.PI*r, color = score>=90?'var(--green)':score>=70?'var(--amber)':'var(--red)';
  const off = c - (Math.min(Math.max(score,0),100)/100)*c;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#EAEDF1" stroke-width="7"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="7" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})"/>
    <text x="50%" y="53%" text-anchor="middle" font-family="Sora,sans-serif" font-weight="800" font-size="${size*0.24}" fill="var(--text)">${Math.round(score)}%</text>
  </svg>`;
}

function bindNombreAutocomplete(){
  const input = document.getElementById('f-nombre');
  const box = document.getElementById('nombre-suggestions');
  if(!input || !box) return;
  function selectAsesor(a){
    input.value = a.nombre;
    evalState.nombre = a.nombre;
    evalState.asesorId = a.id;
    document.getElementById('f-celular').value = a.telefono||'';
    document.getElementById('f-grupo').value = a.grupo||'';
    evalState.celular = a.telefono||'';
    evalState.grupo = a.grupo||'';
    box.classList.remove('show'); box.innerHTML='';
  }
  function showMatches(){
    const q = input.value.trim().toLowerCase();
    let list = q ? asesores.filter(a=>a.nombre.toLowerCase().includes(q)) : asesores;
    list = list.slice(0,8);
    if(!list.length){ box.classList.remove('show'); box.innerHTML=''; return; }
    box.innerHTML = list.map(a=>`<div class="suggest-item" data-id="${a.id}"><span class="s-name">${escapeHtml(a.nombre)}</span><span class="s-grupo">${escapeHtml(a.grupo||'Sin grupo')}</span></div>`).join('');
    box.classList.add('show');
    box.querySelectorAll('.suggest-item').forEach(item=>{
      item.addEventListener('mousedown', e=>{
        e.preventDefault();
        const a = asesores.find(x=>x.id===item.dataset.id);
        if(a) selectAsesor(a);
      });
    });
  }
  input.addEventListener('focus', showMatches);
  input.addEventListener('input', showMatches);
  input.addEventListener('blur', ()=>{ setTimeout(()=>box.classList.remove('show'), 120); });
}

function bindEvaluacionEvents(){
  const view = document.getElementById('view-evaluacion');
  view.querySelectorAll('input,textarea,select').forEach(el=>{
    const evt = el.tagName==='SELECT' ? 'change' : 'input';
    el.addEventListener(evt, ()=>{
      evalState.nombre = document.getElementById('f-nombre').value;
      evalState.celular = document.getElementById('f-celular').value;
      evalState.fecha = document.getElementById('f-fecha').value;
      evalState.grupo = document.getElementById('f-grupo').value;
      evalState.evaluador = document.getElementById('f-evaluador').value;
      const motivoEl = document.getElementById('f-motivo');
      if(motivoEl){
        evalState.motivo = motivoEl.value;
        const detalleField = document.getElementById('motivo-detalle-field');
        if(detalleField) detalleField.style.display = /OTROS/i.test(evalState.motivo) ? 'block' : 'none';
      }
      const detalleEl = document.getElementById('f-motivo-detalle');
      if(detalleEl) evalState.motivoDetalle = detalleEl.value;
      evalState.feedback = document.getElementById('f-feedback').value;
    });
  });
  document.getElementById('f-nombre').addEventListener('change', ()=>{
    const a = findAsesorByName(document.getElementById('f-nombre').value);
    if(a){
      evalState.asesorId = a.id;
      if(!evalState.celular) document.getElementById('f-celular').value = a.telefono||'';
      if(!evalState.grupo) document.getElementById('f-grupo').value = a.grupo||'';
      evalState.celular = document.getElementById('f-celular').value;
      evalState.grupo = document.getElementById('f-grupo').value;
    } else { evalState.asesorId = null; }
  });

  document.getElementById('btn-ret-si').onclick = ()=>{ evalState.retenida = true; renderEvaluacionView(); };
  document.getElementById('btn-ret-no').onclick = ()=>{ evalState.retenida = false; renderEvaluacionView(); };

  view.querySelectorAll('.aquien-opt button').forEach(b=>{
    b.onclick = ()=>{
      if(evalState.aQuien !== b.dataset.aq){ evalState.motivo=''; evalState.motivoDetalle=''; }
      evalState.aQuien = b.dataset.aq;
      renderEvaluacionView();
    };
  });

  view.querySelectorAll('.toggle-btn').forEach(b=>{
    b.addEventListener('click', ()=>{
      const sub = b.dataset.sub, val = b.dataset.val==='true';
      evalState.answers[sub] = val;
      const row = b.closest('.sub-row');
      row.querySelectorAll('.toggle-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      recalcEvaluacion();
    });
  });

  view.querySelectorAll('.falta-check').forEach(cb=>{
    cb.addEventListener('change', ()=>{
      const fid = cb.dataset.fid;
      evalState.faltasChecked = evalState.faltasChecked.filter(x=>x!==fid);
      if(cb.checked) evalState.faltasChecked.push(fid);
      recalcEvaluacion();
    });
  });

  document.getElementById('btn-guardar').onclick = guardarEvaluacion;
  document.getElementById('btn-pdf').onclick = ()=>generarPDFEvaluacion();
  document.getElementById('btn-nueva-eval-2').onclick = ()=>{
    if(confirm('¿Borrar todo y comenzar una nueva evaluación?')){ evalState = newEvalState(); renderEvaluacionView(); }
  };
  bindNombreAutocomplete();
}

function recalcEvaluacion(){
  const r = computeResultado(evalState.answers, evalState.faltasChecked);
  let itemsDone = 0;
  PAUTA.forEach(cat=>cat.items.forEach(item=>{
    const res = r.items[item.id];
    const el = document.getElementById('score-'+item.id);
    if(!el) return;
    if(!res || !res.complete){ el.textContent='—'; el.className='item-score'; }
    else{
      itemsDone++;
      el.textContent = res.cumple ? item.peso+'%' : '0%';
      el.className = 'item-score ' + (res.cumple?'ok':'bad');
    }
  }));
  document.getElementById('sum-items').textContent = itemsDone+'/'+PAUTA.reduce((s,c)=>s+c.items.length,0);
  document.getElementById('sum-faltas').textContent = evalState.faltasChecked.length;
  document.getElementById('ring-holder').innerHTML = ringSVG(r.anulado?0:r.finalScore);
  const banner = document.getElementById('anulado-banner-holder');
  const estado = document.getElementById('estado-texto');
  if(r.anulado){
    banner.innerHTML = '<div class="anulado-banner">⚠ EXAMEN ANULADO — Falta grave detectada</div>';
    estado.textContent = 'La nota se fija en 0% por falta grave.';
  } else {
    banner.innerHTML = '';
    estado.textContent = r.allComplete ? 'Evaluación completa.' : 'Faltan sub-ítems por calificar.';
  }
  evalState._result = r;
}

async function guardarEvaluacion(){
  if(!evalState.nombre){ alert('Ingresa el nombre del asesor.'); return; }
  if(!evalState.evaluador){ alert('Ingresa quién realiza la evaluación.'); return; }
  if(evalState.retenida===null){ alert('Indica si la llamada fue retenida o no.'); return; }
  if(evalState.retenida===false){
    if(!evalState.aQuien){ alert('Indica a qué se debe la no retención (Agente / Cliente / Proceso).'); return; }
    if(!evalState.motivo){ alert('Selecciona el motivo de no retención.'); return; }
  }
  const r = evalState._result || computeResultado(evalState.answers, evalState.faltasChecked);
  if(!r.anulado && !r.allComplete){
    if(!confirm('Hay sub-ítems sin calificar (se contarán como 0%). ¿Guardar de todas formas?')) return;
  }
  const id = evalState.savedId || uid('ev');
  const record = {
    id, nombre: evalState.nombre, asesorId: evalState.asesorId, celular: evalState.celular,
    grupo: evalState.grupo, evaluador: evalState.evaluador, fecha: evalState.fecha,
    retenida: evalState.retenida, aQuien: evalState.aQuien, motivo: evalState.motivo, motivoDetalle: evalState.motivoDetalle,
    answers: {...evalState.answers}, faltasChecked: [...evalState.faltasChecked],
    faltasTexto: evalState.faltasChecked.map(fid=>{const cb=document.querySelector(`.falta-check[data-fid="${fid}"]`); return cb?cb.dataset.txt:fid;}),
    feedback: evalState.feedback, anulado: r.anulado, finalScore: r.anulado?0:r.finalScore,
    itemResults: r.items, createdAt: new Date().toISOString()
  };
  const idx = evaluaciones.findIndex(e=>e.id===id);
  if(idx>=0) evaluaciones[idx]=record; else evaluaciones.push(record);
  evalState.savedId = id;
  await persistEvaluaciones();
  alert('Evaluación guardada correctamente.');
}

    cat.items.forEach(item=>{
      const res = r.itemResults ? r.itemResults[item.id] : null;

function generarPDFEvaluacion(){
  const r = evalState._result || computeResultado(evalState.answers, evalState.faltasChecked);
  const record = {
    nombre: evalState.nombre, celular: evalState.celular, grupo: evalState.grupo, evaluador: evalState.evaluador,
    fecha: evalState.fecha, retenida: evalState.retenida, aQuien: evalState.aQuien, motivo: evalState.motivo, motivoDetalle: evalState.motivoDetalle,
    feedback: evalState.feedback, anulado: r.anulado, finalScore: r.finalScore, itemResults: r.items,
    faltasTexto: evalState.faltasChecked.map(fid=>{const cb=document.querySelector(`.falta-check[data-fid="${fid}"]`); return cb?cb.dataset.txt:fid;})
  };
  const root = document.getElementById('pdf-root');
  const content = document.getElementById('pdf-content');
  const overlay = document.getElementById('pdf-loading-overlay');
  content.innerHTML = buildPdfHTML(record);
  root.style.display = 'block';
  overlay.style.display = 'flex';
  const btn = document.getElementById('btn-pdf');
  const oldLabel = btn ? btn.textContent : '';
  if(btn){ btn.disabled = true; btn.textContent = 'Generando PDF…'; }

  const opt = {
    margin:0, filename:`evaluacion_${(record.nombre||'asesor').replace(/\s+/g,'_')}_${record.fecha}.pdf`,
    image:{type:'jpeg', quality:0.98},
    html2canvas:{scale:2, backgroundColor:'#ffffff', useCORS:true, windowWidth:content.scrollWidth},
    jsPDF:{unit:'pt', format:'a4', orientation:'portrait'}
  };

  const fontsReady = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
  const cleanup = ()=>{
    root.style.display = 'none';
    overlay.style.display = 'none';
    content.innerHTML = '';
    if(btn){ btn.disabled = false; btn.textContent = oldLabel; }
  };

  fontsReady
    .then(()=> new Promise(res=>setTimeout(res, 150))) // let layout settle after display:block
    .then(()=> html2pdf().from(content).set(opt).save())
    .catch(err=>{ console.error('PDF error', err); alert('Ocurrió un error generando el PDF. Inténtalo de nuevo.'); })
    .finally(cleanup);
}

        <div style="flex:1;min-width:200px;">

          <div style="font-size:12.5px;color:var(--text-soft);margin-top:2px;">${escapeHtml(a.grupo||'Sin grupo')} · DNI ${escapeHtml(a.dni||'—')}</div>
        </div>
        <div style="text-align:right;font-size:12px;color:var(--text-soft);">
          <div>${escapeHtml(a.telefono||'—')}</div><div>${escapeHtml(a.correo||'—')}</div>
        </div>
      </div>
    </div>
    <div class="cards-row" style="grid-template-columns:repeat(4,1fr);">
      <div class="card kpi"><div class="kpi-label">Promedio semanal</div><div class="kpi-value">${avgSemana!==null?avgSemana.toFixed(1)+'%':'—'}</div><div class="kpi-foot">${semanaEvs.length} evaluación(es)</div></div>
      <div class="card kpi blue"><div class="kpi-label">Promedio mensual</div><div class="kpi-value">${avgMes!==null?avgMes.toFixed(1)+'%':'—'}</div><div class="kpi-foot">${mesEvs.length} evaluación(es)</div></div>
      <div class="card kpi ${avance===null?'':avance>=0?'green':'red'}"><div class="kpi-label">Avance vs. mes anterior</div><div class="kpi-value">${avance===null?'—':(avance>=0?'+':'')+avance.toFixed(1)+'%'}</div><div class="kpi-foot">Variación de promedio</div></div>
      <div class="card kpi"><div class="kpi-label">Retención</div><div class="kpi-value">${retenidas}/${retenidas+noRetenidas}</div><div class="kpi-foot">Llamadas retenidas</div></div>
    </div>
    <div class="card panel">
      <div class="panel-head"><h3>Histórico de notas</h3></div>
      ${evs.length ? '<canvas id="chart-perfil" height="80"></canvas>' : '<div class="empty">Este asesor aún no tiene evaluaciones registradas.</div>'}
    </div>
    <div class="card panel">
      <div class="panel-head"><h3>Evaluaciones</h3></div>
      ${evs.length ? `<table><tr><th>Fecha</th><th>Evaluador</th><th>Retención</th><th>Nota</th></tr>
        ${[...evs].reverse().map(e=>`<tr><td>${fmtDate(e.fecha)}</td><td>${escapeHtml(e.evaluador||'—')}</td>
        <td>${e.retenida===true?'<span class="badge green">Retenida</span>':e.retenida===false?'<span class="badge red">No retenida</span>':'—'}</td>

  if(evs.length){

function normalizeHeader(h){
  return String(h||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
}
function handleExcelImport(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async (ev)=>{
    try{
      const wb = XLSX.read(ev.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      let imported=0, updated=0;
      rows.forEach(row=>{
        const map = {};
        Object.keys(row).forEach(k=>{ map[normalizeHeader(k)] = row[k]; });
        const nombre = String(map['nombre']||map['asesor']||'').trim();
        if(!nombre) return;
        const dni = String(map['dni']||'').trim();
        const telefono = String(map['telefono']||map['celular']||'').trim();
        const correo = String(map['correo']||map['email']||map['correo electronico']||'').trim();
        const grupo = String(map['grupo']||map['equipo']||'').trim();
        let existing = dni ? asesores.find(a=>a.dni && a.dni===dni) : findAsesorByName(nombre);
        if(existing){
          existing.nombre=nombre||existing.nombre; existing.dni=dni||existing.dni;
          existing.telefono=telefono||existing.telefono; existing.correo=correo||existing.correo; existing.grupo=grupo||existing.grupo;
          updated++;
        } else {
          asesores.push({id:uid('as'), nombre, dni, telefono, correo, grupo});
          imported++;
        }
      });
      await persistAsesores();
      renderBaseDatos();
      alert(`Importación completa: ${imported} nuevo(s), ${updated} actualizado(s).`);
    }catch(err){
      console.error(err);
      alert('No se pudo leer el archivo. Verifica que sea un Excel/CSV válido.');
    }
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
}

function exportAsesoresExcel(){
  const data = asesores.map(a=>({Nombre:a.nombre, DNI:a.dni, Telefono:a.telefono, Correo:a.correo, Grupo:a.grupo}));
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Asesores');
  XLSX.writeFile(wb, 'asesores.xlsx');
}

      <div class="field"><label>Teléfono</label><input id="m-telefono" value="${escapeHtml(a.telefono)}"></div>
      <div class="field"><label>Correo</label><input id="m-correo" value="${escapeHtml(a.correo)}"></div>
      <div class="field"><label>Grupo</label><input id="m-grupo" list="m-grupos-list" value="${escapeHtml(a.grupo)}">
        <datalist id="m-grupos-list">${getGroups().map(g=>`<option value="${escapeHtml(g)}">`).join('')}</datalist>
      </div>
      <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end;">
        <button class="btn btn-outline" id="m-cancel">Cancelar</button>
        <button class="btn btn-primary" id="m-save">${isEdit?'Guardar cambios':'Agregar'}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#m-cancel').onclick = ()=>overlay.remove();
  overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.remove(); });
  overlay.querySelector('#m-save').onclick = async ()=>{
    const nombre = overlay.querySelector('#m-nombre').value.trim();
    if(!nombre){ alert('El nombre es obligatorio.'); return; }
    const fields = {
      nombre, dni: overlay.querySelector('#m-dni').value.trim(),
      telefono: overlay.querySelector('#m-telefono').value.trim(),
      correo: overlay.querySelector('#m-correo').value.trim(),
      grupo: overlay.querySelector('#m-grupo').value.trim()
    };
    if(isEdit){ Object.assign(a, fields); }
    else asesores.push({id:uid('as'), ...fields});
    await persistAsesores();
    overlay.remove();
    renderBaseDatos();
  };
}

async function deleteAsesor(id){
  if(!confirm('¿Eliminar este asesor de la base de datos? Sus evaluaciones guardadas no se borrarán.')) return;
  asesores = asesores.filter(a=>a.id!==id);
  await persistAsesores();
  renderBaseDatos();
}

/* ============================== INIT ============================== */
async function initApp(){
  const dot = document.getElementById('storage-dot');
  const label = document.getElementById('storage-label');
  await loadAll();
  if(Storage.mode === 'claude'){
    dot.classList.remove('off'); label.textContent = 'Datos sincronizados (Claude.ai)';
  } else if(Storage.mode === 'firebase'){
    dot.classList.remove('off'); label.textContent = 'Datos sincronizados (Firebase)';
  } else {
    dot.classList.add('off'); label.textContent = 'Sin almacenamiento — configura Firebase';
  }
  renderDashboard();
}
initApp();
</script>
</body>
